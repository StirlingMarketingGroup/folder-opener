name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build .deb packages
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LD="-s -w -X main.version=${VERSION}"
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" go build -trimpath -ldflags "$LD" -o folder-opener .
            NFPM_ARCH="$arch" NFPM_VERSION="${VERSION#v}" \
              nfpm package -f packaging/linux/nfpm.yaml -p deb \
              -t "dist/folder-opener_${VERSION}_linux_${arch}.deb"
            rm folder-opener
          done
      - uses: actions/upload-artifact@v6
        with:
          name: dist-linux
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build .msi installers + bare .exe
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          # MSI ProductVersion must be numeric x.y.z
          MSI_VERSION="${VERSION#v}"
          LD="-s -w -X main.version=${VERSION} -H windowsgui"
          # Pinned to v5: WiX v7+ requires the paid OSMF EULA in CI (WIX7015)
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.Util.wixext/5.0.2
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=windows GOARCH="$arch" go build -trimpath -ldflags "$LD" -o folder-opener.exe .
            case "$arch" in
              amd64) wixarch=x64 ;;
              arm64) wixarch=arm64 ;;
            esac
            wix build packaging/windows/folder-opener.wxs \
              -ext WixToolset.Util.wixext \
              -arch "$wixarch" -d "Version=${MSI_VERSION}" -pdbtype none \
              -o "dist/folder-opener_${VERSION}_windows_${arch}.msi"
            cp folder-opener.exe "dist/folder-opener_${VERSION}_windows_${arch}.exe"
            rm folder-opener.exe
          done
      - uses: actions/upload-artifact@v6
        with:
          name: dist-windows
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Same keychain-import dance as Dazzle's release workflow; skipped when
      # the signing secrets aren't configured so releases still build unsigned.
      # (env-based guard: the secrets context isn't allowed in step-level if)
      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDCA.cer" -o $RUNNER_TEMP/DeveloperIDCA.cer
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o $RUNNER_TEMP/DeveloperIDG2CA.cer
          security import $RUNNER_TEMP/DeveloperIDCA.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true
          security import $RUNNER_TEMP/DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build .app, sign, create .dmg, notarize, staple
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LD="-s -w -X main.version=${VERSION}"
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "$LD" -o folder-opener-amd64 .
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "$LD" -o folder-opener-arm64 .
          lipo -create -output folder-opener folder-opener-amd64 folder-opener-arm64

          APP="Folder Opener.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp folder-opener "$APP/Contents/MacOS/folder-opener"
          cp assets/icon.icns "$APP/Contents/Resources/icon.icns"
          sed "s/__VERSION__/${VERSION#v}/g" packaging/macos/Info.plist > "$APP/Contents/Info.plist"

          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Signing with Developer ID..."
            codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" "$APP"
            codesign --verify --deep --verbose "$APP"
          else
            echo "Skipping code signing — Apple certificate not configured"
          fi

          mkdir -p dist
          DMG="dist/folder-opener_${VERSION}_macos_universal.dmg"
          STAGING=$(mktemp -d)
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          for attempt in 1 2 3; do
            hdiutil create -volname "Folder Opener" -srcfolder "$STAGING" -ov -format UDZO "$DMG" && break
            echo "hdiutil attempt $attempt failed, retrying in 10s..."
            sleep 10
          done
          rm -rf "$STAGING"

          if [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ]; then
            echo "Notarizing $DMG..."
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$DMG"
          else
            echo "Skipping notarization — Apple credentials not configured"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: dist-macos
          path: dist/*

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC) + provenance
    defaults:
      run:
        working-directory: packages/client
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Auth is npm trusted publishing (OIDC) — no token. Requires npm >= 11.5,
      # newer than what ships with the runner's Node.
      - run: npm install -g npm@latest
      - name: Publish to npm
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "folder-opener@${VERSION}" version >/dev/null 2>&1; then
            echo "folder-opener@${VERSION} already on the registry — skipping publish"
            exit 0
          fi
          # Keep the published version locked to the release tag
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm ci
          npm publish --access public
